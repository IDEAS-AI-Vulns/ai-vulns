<c-card class="components-card">
    <c-card-header>
        <h5 class="mb-0">Detected Dependencies</h5>
        <p class="text-muted mb-0">Open-source components identified in the codebase</p>
    </c-card-header>
    <c-card-body>
        <div class="components-controls mb-4">
            <div class="components-filter">
                <div class="row g-3">
                    <div class="col-md-4">
                        <div class="filter-group">
                            <label class="filter-label">Group</label>
                            <div class="input-group">
                                                    <span class="input-group-text">
                                                        <svg cIcon name="cil-filter" class="filter-icon"></svg>
                                                    </span>
                                <input type="text" class="form-control"
                                       placeholder="Filter by group"
                                       (input)="updateFilterGroup($event)" />
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="filter-group">
                            <label class="filter-label">Name</label>
                            <div class="input-group">
                                                    <span class="input-group-text">
                                                        <svg cIcon name="cil-filter" class="filter-icon"></svg>
                                                    </span>
                                <input type="text" class="form-control" placeholder="Filter by name"
                                       (input)="updateFilterNameNew($event)" />
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="filter-group">
                            <label class="filter-label">Version</label>
                            <div class="input-group">
                                                    <span class="input-group-text">
                                                        <svg cIcon name="cil-filter" class="filter-icon"></svg>
                                                    </span>
                                <input type="text" class="form-control"
                                       placeholder="Filter by version"
                                       (input)="updateFilterVersion($event)" />
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div
                    class="components-pagination mt-3 d-flex justify-content-between align-items-center">
                <div class="components-count" *ngIf="codeRepoComponents().length > 0">
                    <span class="badge bg-info">{{ codeRepoComponents().length }} components</span>
                </div>

                <div class="components-page-size d-flex align-items-center">
                    <label class="page-size-label me-2">Show</label>
                    <select class="form-select page-size-select" [(ngModel)]="componentsLimit">
                        <option [value]="10">10</option>
                        <option [value]="20">20</option>
                        <option [value]="50">50</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="components-table">
            <div *ngIf="isLoading()" class="loading-state text-center p-5">
                <c-spinner color="primary"></c-spinner>
                <p class="mt-2 text-muted">Loading components...</p>
            </div>

            <div *ngIf="error()" class="error-state text-center p-5">
                <svg cIcon name="cil-warning" width="48" height="48" class="text-danger mb-3"></svg>
                <h5>Error loading components</h5>
                <p class="text-muted">{{ error() }}</p>
                <button cButton color="primary" (click)="loadCodeRepoComponents(repoId)">
                    Retry
                </button>
            </div>

            <ngx-datatable *ngIf="!isLoading() && !error() && codeRepoComponents().length > 0"
                           class="bootstrap components-datatable"
                           [rows]="codeRepoComponents()"
                           [columnMode]="'force'"
                           [footerHeight]="50"
                           [headerHeight]="50"
                           [rowHeight]="'auto'"
                           [limit]="componentsLimit">
                <ngx-datatable-column name="Group" prop="groupid">
                    <ng-template ngx-datatable-cell-template let-row="row">
                        <div class="group-cell" [cTooltip]="row?.groupid">
                            {{ row?.groupid }}
                        </div>
                    </ng-template>
                </ngx-datatable-column>

                <ngx-datatable-column name="Name" prop="name">
                    <ng-template ngx-datatable-cell-template let-row="row">
                        <div class="name-cell">
                            <strong>{{ row?.name }}</strong>
                        </div>
                    </ng-template>
                </ngx-datatable-column>

                <ngx-datatable-column name="Version" prop="version" [width]="120">
                    <ng-template ngx-datatable-cell-template let-row="row">
                        <div class="version-cell">
                            <c-badge color="info">{{ row?.version }}</c-badge>
                        </div>
                    </ng-template>
                </ngx-datatable-column>
            </ngx-datatable>

            <div *ngIf="!isLoading() && !error() && codeRepoComponents().length === 0" class="empty-state">
                <svg cIcon name="cil-puzzle" width="48" height="48"></svg>
                <h5>No components found</h5>
                <p>No components match your filter criteria.</p>
                <button cButton color="primary" (click)="clearComponentFilters()">Clear filters
                </button>
            </div>
        </div>
    </c-card-body>
</c-card>
